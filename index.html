<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOXEX | Utility</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020204;
            --accent: #ffffff;
            --accent-glow: rgba(14, 165, 233, 0.4);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --card-bg: rgba(10, 10, 12, 0.7);
            --border: rgba(255, 255, 255, 0.06);
            --glass: blur(16px);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.08) 0%, transparent 60%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.5); }
        }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: var(--glass);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: authIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes authIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-card h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .auth-card p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .auth-input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .auth-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            text-align: center;
            letter-spacing: 2px;
        }

        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: var(--accent);
            color: rgb(0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .shake {
            animation: shakeError 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        #main-app {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.98);
            height: 100vh;
            overflow-y: auto;
        }

        #main-app.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .top-nav {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 65px;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.2rem;
            margin-left: 15px;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            padding: 10px 22px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-btn.active {
            background: var(--text-main);
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .container {
            padding-top: 140px;
            max-width: 1000px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        .page {
            display: none;
            width: 100%;
        }

        .page.active {
            display: block;
            animation: pageEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: var(--glass);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        .card:hover {
            border-color: rgba(255,255,255,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 18px;
            border-radius: 100px;
            border: 1px solid var(--border);
            letter-spacing: 1px;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: var(--transition); }
        .status-dot.active { background: #10b981; box-shadow: 0 0 15px #10b981; }

        .editor-box {
            background: #050505;
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .lua-input {
            width: 100%;
            height: 380px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--accent);
            font-family: 'Consolas', monospace;
            font-size: 1rem;
            resize: none;
            line-height: 1.5;
        }

        .action-row {
            display: flex;
            gap: 15px;
        }

        .btn-exec {
            background: var(--text-main);
            color: black;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: center;
        }

        .btn-exec:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        }

        .btn-clear {
            background: rgba(255,255,255,0.05);
            color: white;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 700;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-clear:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
        }

        .tweak-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .tweak-item {
            background: rgba(0,0,0,0.4);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .tweak-item:hover {
            border-color: rgba(14, 165, 233, 0.3);
            transform: translateY(-5px);
            background: rgba(14, 165, 233, 0.05);
        }

        .tweak-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .tweak-val {
            color: var(--accent);
            font-weight: 700;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: var(--transition);
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border);
            border-radius: 2px;
        }

        .notif-box {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .toast {
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            padding: 18px 25px;
            border-radius: 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: toastIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: right;
        }

        @keyframes toastIn { 
            from { transform: translateX(120%) scale(0.9); opacity: 0; } 
            to { transform: translateX(0) scale(1); opacity: 1; } 
        }

        .toast.hide { 
            transform: translateX(120%) scale(0.9); 
            opacity: 0; 
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .toast-icon {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: rgba(14, 165, 233, 0.1);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="background-layer" id="bgLayer"></div>
    <div class="notif-box" id="notifBox"></div>

    <div id="auth-overlay">
        <div class="auth-card" id="authCard">
            <h2>LOXEX</h2>
            <p>Authentication Required</p>
            <div class="auth-input-group">
                <input type="password" id="keyInput" class="auth-input" placeholder="Enter Access Key" autocomplete="off">
            </div>
            <button class="btn-main" onclick="verifyKey()">
                <i class="fa-solid fa-unlock-keyhole"></i> CHECK
            </button>
        </div>
    </div>

    <div id="main-app">
        <header class="top-nav">
            <div class="nav-logo">LOXEX</div>
            <div class="nav-tabs">
                <div class="nav-btn active" onclick="showPage('tweaks', this)">Tweaks</div>
                <div class="nav-btn" onclick="showPage('exec', this)">Executor</div>
            </div>
        </header>

        <main class="container">
            <div id="tweaks" class="page active">
                <div class="section-header">
                    <h3 class="section-title">Configuration Tweaks</h3>
                </div>
                <div class="card tweak-grid">
                    <div class="tweak-item">
                        <div class="tweak-label">
                            <span>WalkSpeed</span>
                            <span class="tweak-val" id="wsVal">16</span>
                        </div>
                        <input type="range" min="16" max="200" value="16" oninput="document.getElementById('wsVal').innerText = this.value">
                    </div>
                    <div class="tweak-item">
                        <div class="tweak-label">
                            <span>JumpPower</span>
                            <span class="tweak-val" id="jpVal">50</span>
                        </div>
                        <input type="range" min="50" max="300" value="50" oninput="document.getElementById('jpVal').innerText = this.value">
                    </div>
                    <div class="tweak-item">
                        <div class="tweak-label">
                            <span>Field of View</span>
                            <span class="tweak-val" id="fovVal">70</span>
                        </div>
                        <input type="range" min="70" max="120" value="70" oninput="document.getElementById('fovVal').innerText = this.value">
                    </div>
                    <div class="tweak-item">
                        <div class="tweak-label">
                            <span>Gravity</span>
                            <span class="tweak-val" id="gravVal">196.2</span>
                        </div>
                        <input type="range" min="0" max="196" value="196" oninput="document.getElementById('gravVal').innerText = this.value">
                    </div>
                </div>
            </div>

            <div id="exec" class="page">
                <div class="section-header">
                    <h3 class="section-title">Luau Environment</h3>
                    <div class="status-badge">
                        <div class="status-dot" id="injectDot"></div>
                        <span id="injectText">READY</span>
                    </div>
                </div>
                <div class="card">
                    <div class="editor-box">
                        <textarea class="lua-input" id="editor" spellcheck="false" placeholder="print('Hello LOXEX!')"></textarea>
                    </div>
                    <div class="action-row">
                        <button class="btn-exec" onclick="handleExecute()">
                            <i class="fa-solid fa-play"></i> EXECUTE
                        </button>
                        <button class="btn-clear" onclick="document.getElementById('editor').value = ''">
                            <i class="fa-solid fa-trash-can"></i> CLEAR
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function spawnSparkles() {
            const bg = document.getElementById('bgLayer');
            for(let i=0; i<35; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                const size = Math.random() * 3 + 1;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.setProperty('--d', (Math.random() * 5 + 3) + 's');
                bg.appendChild(s);
            }
        }

        function createToast(title, msg, isSuccess = true) {
            const box = document.getElementById('notifBox');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = isSuccess ? 'fa-check' : 'fa-xmark';
            const color = isSuccess ? 'var(--accent)' : '#ef4444';
            
            toast.innerHTML = `
                <div class="toast-icon" style="color: ${color}; background: ${isSuccess ? 'rgba(14,165,233,0.1)' : 'rgba(239,68,68,0.1)'}">
                    <i class="fa-solid ${icon}"></i>
                </div>
                <div>
                    <div style="font-weight:700; font-size:0.9rem; letter-spacing:0.5px;">${title}</div>
                    <div style="font-size:0.8rem; opacity:0.7; margin-top:3px;">${msg}</div>
                </div>
            `;
            box.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        const url = "http://localhost:52341/";

        function verifyKey() {
            const input = document.getElementById('keyInput');
            const card = document.getElementById('authCard');
            const overlay = document.getElementById('auth-overlay');
            const app = document.getElementById('main-app');
                
            fetch(url + "login", {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: input.value
            })
            .then(response => response.json())
            .then(data => {
            
                if (data === "VALID" || data.status === "VALID") {
                
                    createToast('Authenticated', 'Welcome back, Operator.', true);
                
                    overlay.style.opacity = '0';
                    overlay.style.visibility = 'hidden';
                
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        app.classList.add('active');
                    }, 800);
                
                } else {
                
                    card.classList.remove('shake');
                    void card.offsetWidth;
                    card.classList.add('shake');
                
                    createToast('Access Denied', 'Invalid key provided.', false);
                
                    input.value = '';
                }
            
            })
            .catch(err => {
                console.error("Request failed:", err);
                createToast('Error', 'Server not responding.', false);
            });
        }

        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyKey();
        });

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        }

        function handleExecute() {
            const input = document.getElementById('editor').value;
            const dot = document.getElementById('injectDot');
            const text = document.getElementById('injectText');
            
            if(!input.trim()) {
                createToast('Warning', 'Script buffer is empty.', false);
                return;
            }

            fetch(url + "lua", {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: input.value
            })
            
            text.innerText = "EXECUTING...";
            dot.classList.add('active');
            
            setTimeout(() => {
                text.innerText = "READY";
                dot.classList.remove('active');
                createToast('Success', 'Script executed perfectly.', true);
            }, 800);
        }

        window.onload = () => {
            spawnSparkles();
        };
    </script>
</body>
</html>
